[surveillance]
# Répertoire local où sont reçues/stockées les images
repertoire_surveille = /home/user/images_input
# Extensions d'images acceptées (séparées par des virgules)
extensions = .jpg,.jpeg,.png,.bmp,.tiff,.gif
# Dossier où déplacer les images après envoi réussi (laisser vide = ne pas déplacer)
dossier_envoye = /home/user/images_envoyees

[serveur_ftp]
# Serveur FTP intégré en écoute (réception des images)
actif = true
port_ecoute = 2121
# Adresse d'écoute (0.0.0.0 = toutes les interfaces)
adresse_ecoute = 0.0.0.0
# Identifiants pour se connecter au serveur intégré
# Laisser vide = accès anonyme (pas besoin d'identifiants)
utilisateur =
mot_de_passe =
# Autoriser les connexions anonymes (true/false)
anonyme = true
# Adresse IP à annoncer aux clients en mode passif (PASV)
# IMPORTANT : mettre l'IP locale de cette machine sur le réseau (ex: 192.168.1.50)
# Laisser vide = pyftpdlib choisit automatiquement (peut ne pas fonctionner)
masquerade_address =
# Plage de ports passifs (pour les connexions derrière un pare-feu)
port_passif_min = 60000
port_passif_max = 60100

[ftp]
# Paramètres de connexion au serveur FTP distant
host = 192.168.1.100
port = 21
utilisateur = ftpuser
mot_de_passe = ftppass
# Dossier distant où stocker les images
dossier_distant = /images
# Nombre maximum d'images dans le dossier distant
max_images = 20000
# Mode passif (recommandé derrière un pare-feu/NAT)
mode_passif = true

[interface]
# Plein écran (true = plein écran, false = fenêtré)
plein_ecran = true
# Touche pour quitter (Escape, F1-F12, Q)
touche_quitter = Escape
# Timeout en secondes pour attendre qu'un fichier soit complètement écrit
timeout_fichier_secs = 15
# Nombre de tentatives d'envoi FTP avant abandon (0 = pas de retry)
retries_upload = 3
